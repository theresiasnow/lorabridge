[source]
type = "serial"          # "serial" or "lora"
port = "COM3"            # or "/dev/ttyUSB0"
baud = 9600

[source.lora]
broker   = "mqtt.meshtastic.org"
port     = 1883
username = "meshdev"
password = "large4cats"
topic    = "msh/EU_868/SE/#"
node_id  = "!7a78e5e3"     # filter to own node only
primary_key = "AQ=="       # primary channel (index 0) PSK — AQ== = Meshtastic default 128-bit key
device_host = ""           # optional: TCP node IP for sending (e.g. "192.168.1.100"); leave blank if using BLE/serial

[source.lora.channels.LongFast]
enabled   = true
encrypted = false

[source.lora.channels.TSS]
enabled   = true
encrypted = true
key       = "base64-psk-here"    # AQ== = Meshtastic default · 16-byte b64 = AES-128 · 32-byte b64 = AES-256

[nmea_server]
enabled = true
port    = 10110          # pi-star points here

[aprs]
enabled   = true
callsign  = "SM5XYZ-9"
passcode  = 12345
server    = "rotate.aprs2.net"
port      = 14580
interval  = 60           # seconds between beacons

[gpsd]
enabled = true
port    = 2947

[rigtop]
enabled = false
port    = 10111
